name: Build & Push FastAPI Docker Image

on:
  push:
    branches: [main]
    paths:
      - "backend-fastapi/**"
  workflow_dispatch:

env:
  IMAGE_NAME: mananchataut/neurocontent-fastapi
  CONTAINER_NAME: neurocontent-fastapi
  CONTAINER_PORT: 8000

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend-fastapi
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          EC2_PORT="${EC2_PORT:-22}"
          mkdir -p ~/.ssh
          printf "%s" "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
        run: |
          EC2_PORT="${EC2_PORT:-22}"
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "
            set -e
            docker pull $IMAGE_NAME:$IMAGE_TAG
            docker rm -f $CONTAINER_NAME || true

            ENV_FILE_ARGS=''
            if [ -n \"$EC2_ENV_FILE\" ]; then
              ENV_FILE_ARGS=\"--env-file $EC2_ENV_FILE\"
            fi

            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p $CONTAINER_PORT:8000 \
              \$ENV_FILE_ARGS \
              $IMAGE_NAME:$IMAGE_TAG
          "
